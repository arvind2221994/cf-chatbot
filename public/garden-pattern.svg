<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3fff4"/>
      <stop offset="55%" stop-color="#eefbf0"/>
      <stop offset="100%" stop-color="#f7fff9"/>
    </linearGradient>

    <!-- Subtle repeating garden/leaf pattern -->
    <pattern id="leaf" width="120" height="120" patternUnits="userSpaceOnUse">
      <!-- stem -->
      <path d="M60 18 C58 44 58 70 60 102" stroke="#1b5e20" stroke-opacity="0.10" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- leaves -->
      <path d="M60 42 C44 34 34 22 30 12 C46 16 58 24 66 36 C66 38 64 40 60 42 Z"
            fill="#2e7d32" fill-opacity="0.08"/>
      <path d="M60 42 C76 34 86 22 90 12 C74 16 62 24 54 36 C54 38 56 40 60 42 Z"
            fill="#2e7d32" fill-opacity="0.07"/>

      <path d="M60 70 C46 62 36 52 30 42 C46 44 58 52 66 64 C66 66 64 68 60 70 Z"
            fill="#388e3c" fill-opacity="0.07"/>
      <path d="M60 70 C74 62 84 52 90 42 C74 44 62 52 54 64 C54 66 56 68 60 70 Z"
            fill="#388e3c" fill-opacity="0.06"/>

      <!-- tiny dots like seeds -->
      <circle cx="18" cy="26" r="2" fill="#0d47a1" fill-opacity="0.05"/>
      <circle cx="102" cy="86" r="2" fill="#6a1b9a" fill-opacity="0.05"/>
      <circle cx="24" cy="96" r="1.6" fill="#1b5e20" fill-opacity="0.05"/>
    </pattern>

    <!-- soft vignette -->
    <radialGradient id="v" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0b3d0b" stop-opacity="0.06"/>
    </radialGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#leaf)"/>
  <rect width="800" height="800" fill="url(#v)"/>
</svg>
